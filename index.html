<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Leitner 학습기</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .card-flip { perspective: 1000px; }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .card-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .card-back { transform: rotateY(180deg); background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); color: white; }
        .box-container { transition: all 0.3s ease; border-bottom: 8px solid #e2e8f0; }
        .box-container:hover { transform: translateY(-5px); border-bottom-color: #6366f1; }
        .progress-fill { transition: height 0.5s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 라이트너 규격 (cm 비율을 수용량으로 환산)
        const BOX_CONFIG = [
            { id: 0, label: "1번 상자", width: "1cm", capacity: 10, color: "bg-red-400" },
            { id: 1, label: "2번 상자", width: "2cm", capacity: 20, color: "bg-orange-400" },
            { id: 2, label: "3번 상자", width: "5cm", capacity: 40, color: "bg-yellow-400" },
            { id: 3, label: "4번 상자", width: "8cm", capacity: 60, color: "bg-green-400" },
            { id: 4, label: "5번 상자", width: "14cm", capacity: 100, color: "bg-blue-400" }
        ];

        function App() {
            const [cards, setCards] = useState(() => {
                const saved = localStorage.getItem('leitner-data');
                return saved ? JSON.parse(saved) : [];
            });
            const [topic, setTopic] = useState("");
            const [loading, setLoading] = useState(false);
            const [studyCard, setStudyCard] = useState(null);
            const [isFlipped, setIsFlipped] = useState(false);

            useEffect(() => {
                localStorage.setItem('leitner-data', JSON.stringify(cards));
            }, [cards]);

            // AI 카드 생성 로직
            const generateCards = () => {
                if (!topic) return;
                setLoading(true);
                // 실제 서비스 시 API 호출부, 여기서는 시뮬레이션
                setTimeout(() => {
                    const newCards = [
                        { id: Date.now()+1, q: `${topic}의 핵심 정의는?`, a: `${topic}에 대한 AI의 상세 답변입니다.`, box: 0 },
                        { id: Date.now()+2, q: `${topic}의 주요 특징 3가지는?`, a: "첫째, 둘째, 셋째 특징이 있습니다.", box: 0 },
                        { id: Date.now()+3, q: `${topic} 실전 예시`, a: "이러한 상황에서 활용될 수 있습니다.", box: 0 }
                    ];
                    setCards([...cards, ...newCards]);
                    setTopic("");
                    setLoading(false);
                }, 1000);
            };

            const handleAnswer = (isCorrect) => {
                setCards(prev => prev.map(c => {
                    if (c.id === studyCard.id) {
                        return { ...c, box: isCorrect ? Math.min(c.box + 1, 4) : 0 };
                    }
                    return c;
                }));
                nextCard(studyCard.box);
            };

            const nextCard = (boxIdx) => {
                const boxCards = cards.filter(c => c.box === boxIdx && c.id !== studyCard?.id);
                if (boxCards.length > 0) {
                    setStudyCard(boxCards[0]);
                    setIsFlipped(false);
                } else {
                    setStudyCard(null);
                }
            };

            const startBoxStudy = (idx) => {
                const boxCards = cards.filter(c => c.box === idx);
                if (boxCards.length === 0) return alert("공부할 카드가 없습니다!");
                setStudyCard(boxCards[0]);
                setIsFlipped(false);
            };

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-10">
                    <header className="flex justify-between items-end mb-12">
                        <div>
                            <h1 className="text-3xl font-black text-slate-800 tracking-tight">LEITNER SYSTEM</h1>
                            <p className="text-slate-500">세바스티안 라이트너의 공부의 비결</p>
                        </div>
                        <div className="text-right">
                            <span className="text-sm font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">AI 자동 생성 모드</span>
                        </div>
                    </header>

                    {/* AI 입력창 */}
                    <div className="bg-white p-2 rounded-2xl shadow-xl flex gap-2 mb-12 border border-slate-100">
                        <input 
                            className="flex-1 px-6 py-3 rounded-xl focus:outline-none font-medium"
                            placeholder="공부하고 싶은 주제를 입력하세요..."
                            value={topic}
                            onChange={e => setTopic(e.target.value)}
                        />
                        <button 
                            onClick={generateCards}
                            disabled={loading}
                            className="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition-all active:scale-95 disabled:bg-slate-300"
                        >
                            {loading ? "AI 분석중..." : "카드 만들기"}
                        </button>
                    </div>

                    {/* 라이트너 박스 시각화 */}
                    <div className="grid grid-cols-5 gap-4 h-64 items-end mb-20">
                        {BOX_CONFIG.map((box) => {
                            const count = cards.filter(c => c.box === box.id).length;
                            const fillPercent = Math.min((count / box.capacity) * 100, 100);
                            const isFull = count >= box.capacity;

                            return (
                                <div key={box.id} className="flex flex-col h-full group">
                                    <div 
                                        onClick={() => startBoxStudy(box.id)}
                                        className={`flex-1 relative rounded-t-2xl box-container cursor-pointer overflow-hidden bg-white ${isFull ? 'ring-4 ring-red-400' : ''}`}
                                    >
                                        <div 
                                            className={`absolute bottom-0 w-full progress-fill ${box.color} opacity-80`}
                                            style={{ height: `${fillPercent}%` }}
                                        ></div>
                                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                                            <span className="text-2xl font-black text-slate-700">{count}</span>
                                            <span className="text-[10px] font-bold uppercase text-slate-400 tracking-tighter">Cards</span>
                                        </div>
                                    </div>
                                    <div className="mt-4 text-center">
                                        <div className="text-[10px] font-black text-slate-400 mb-1">{box.width}</div>
                                        <div className="text-xs font-bold text-slate-600 truncate">{box.label}</div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* 학습 팝업 모달 */}
                    {studyCard && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="w-full max-w-lg">
                                <div className="card-flip w-full h-96 mb-8" onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`card-inner h-full relative ${isFlipped ? 'card-flipped' : ''}`}>
                                        <div className="card-front bg-white">
                                            <div className="text-center">
                                                <div className="text-indigo-500 font-black mb-4 tracking-widest text-sm uppercase underline decoration-4 decoration-indigo-100 underline-offset-8">Question</div>
                                                <h2 className="text-2xl font-bold text-slate-800 leading-snug">{studyCard.q}</h2>
                                                <p className="mt-12 text-slate-400 text-sm animate-pulse italic">카드를 터치하여 답변 확인</p>
                                            </div>
                                        </div>
                                        <div className="card-back overflow-y-auto">
                                            <div className="text-center">
                                                <div className="text-indigo-200 font-black mb-4 tracking-widest text-sm uppercase">Answer</div>
                                                <p className="text-xl leading-relaxed">{studyCard.a}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {isFlipped && (
                                    <div className="flex gap-4 animate__animated animate__fadeInUp animate__faster">
                                        <button 
                                            onClick={() => handleAnswer(false)}
                                            className="flex-1 bg-white/10 hover:bg-red-500 text-white border-2 border-white/20 py-4 rounded-2xl font-black transition-all"
                                        >
                                            모르겠어요
                                        </button>
                                        <button 
                                            onClick={() => handleAnswer(true)}
                                            className="flex-1 bg-indigo-500 hover:bg-indigo-400 text-white py-4 rounded-2xl font-black shadow-lg shadow-indigo-500/50 transition-all"
                                        >
                                            알겠어요!
                                        </button>
                                    </div>
                                )}
                                <button 
                                    onClick={() => setStudyCard(null)}
                                    className="w-full mt-8 text-slate-400 hover:text-white transition-colors text-sm font-bold"
                                >
                                    학습 그만두기
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
