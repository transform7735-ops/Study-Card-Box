<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Leitner Box - 공부의 비결</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        .card-flip { perspective: 1000px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .card-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .card-back { transform: rotateY(180deg); }
        .box-depth { box-shadow: inset 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const BOX_SIZES = [10, 20, 50, 80, 140]; // 라이트너 규격 비율 (수용량 설정)
        const BOX_LABELS = ["1단계 (매일)", "2단계 (2-3일)", "3단계 (7일)", "4단계 (15일)", "5단계 (완성)"];

        function App() {
            const [cards, setCards] = useState(() => {
                const saved = localStorage.getItem('leitner-cards');
                return saved ? JSON.parse(saved) : [];
            });
            const [topic, setTopic] = useState("");
            const [isGenerating, setIsGenerating] = useState(false);
            const [currentStudyCard, setCurrentStudyCard] = useState(null);
            const [isFlipped, setIsFlipped] = useState(false);
            const [activeBox, setActiveBox] = useState(0);

            useEffect(() => {
                localStorage.setItem('leitner-cards', JSON.stringify(cards));
            }, [cards]);

            // AI 카드 생성 (가상의 API 호출 시뮬레이션 - 실제 구현시 OpenAI API 연결)
            const generateAICards = async () => {
                if (!topic) return alert("주제를 입력하세요");
                setIsGenerating(true);
                
                // 실제 연동시 여기에 fetch(OpenAI API) 코드가 들어갑니다.
                setTimeout(() => {
                    const newCards = [
                        { id: Date.now() + 1, front: `${topic}에 대한 질문 1?`, back: "AI가 생성한 답변입니다.", box: 0, lastReview: Date.now() },
                        { id: Date.now() + 2, front: `${topic}의 핵심 개념은?`, back: "학습 효과를 극대화하는 라이트너 시스템입니다.", box: 0, lastReview: Date.now() },
                        { id: Date.now() + 3, front: `${topic} 예시 문제`, back: "정답은 꾸준한 반복입니다.", box: 0, lastReview: Date.now() },
                    ];
                    setCards([...cards, ...newCards]);
                    setIsGenerating(false);
                    setTopic("");
                }, 1500);
            };

            const startStudy = (boxIndex) => {
                const boxCards = cards.filter(c => c.box === boxIndex);
                if (boxCards.length === 0) return alert("이 상자에는 카드가 없습니다.");
                setCurrentStudyCard(boxCards[0]);
                setIsFlipped(false);
            };

            const handleResult = (isCorrect) => {
                setCards(prev => prev.map(c => {
                    if (c.id === currentStudyCard.id) {
                        const nextBox = isCorrect ? Math.min(c.box + 1, 4) : 0;
                        return { ...c, box: nextBox, lastReview: Date.now() };
                    }
                    return c;
                }));
                
                // 다음 카드 자동 추출
                const nextCardsInBox = cards.filter(c => c.box === currentStudyCard.box && c.id !== currentStudyCard.id);
                if (nextCardsInBox.length > 0) {
                    setCurrentStudyCard(nextCardsInBox[0]);
                    setIsFlipped(false);
                } else {
                    setCurrentStudyCard(null);
                }
            };

            const boxStats = BOX_SIZES.map((size, idx) => ({
                count: cards.filter(c => c.box === idx).length,
                capacity: size,
                isFull: cards.filter(c => c.box === idx).length >= size
            }));

            return (
                <div class="max-w-4xl mx-auto p-6">
                    <header class="text-center mb-10">
                        <h1 class="text-4xl font-bold text-indigo-700 mb-2">Study Smart: Leitner Box</h1>
                        <p class="text-gray-600">세바스티안 라이트너의 '공부의 비결' 방식 AI 학습</p>
                    </header>

                    {/* AI Generator Section */}
                    <div class="bg-white p-6 rounded-2xl shadow-lg mb-10 border border-indigo-100">
                        <div class="flex gap-4">
                            <input 
                                type="text" 
                                value={topic}
                                onChange={(e) => setTopic(e.target.value)}
                                placeholder="학습할 주제를 입력하세요 (예: JavaScript 클로저)"
                                class="flex-1 p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500"
                            />
                            <button 
                                onClick={generateAICards}
                                disabled={isGenerating}
                                class="bg-indigo-600 text-white px-6 py-3 rounded-xl hover:bg-indigo-700 transition disabled:bg-gray-400"
                            >
                                {isGenerating ? "AI 생성 중..." : "AI 카드 생성"}
                            </button>
                        </div>
                    </div>

                    {/* Leitner Boxes Visualization */}
                    <div class="grid grid-cols-5 gap-4 mb-10 items-end h-64">
                        {boxStats.map((stat, i) => (
                            <div key={i} class="flex flex-col items-center">
                                <div 
                                    onClick={() => startStudy(i)}
                                    class={`w-full box-depth rounded-t-lg cursor-pointer transition-all hover:brightness-110 flex flex-col-reverse items-center justify-start overflow-hidden
                                        ${stat.isFull ? 'bg-red-100 border-2 border-red-400' : 'bg-indigo-50 border-2 border-indigo-200'}
                                    `}
                                    style={{ height: `${(i + 2) * 30}px` }}
                                >
                                    {/* 카드 시각화 (쌓인 장수만큼 색상 채우기) */}
                                    <div 
                                        class="w-full bg-indigo-500 transition-all duration-500"
                                        style={{ height: `${(stat.count / stat.capacity) * 100}%` }}
                                    ></div>
                                    <span class="absolute mb-2 font-bold text-indigo-800">{stat.count}장</span>
                                </div>
                                <p class="text-xs mt-2 font-semibold text-gray-500">{BOX_LABELS[i]}</p>
                            </div>
                        ))}
                    </div>

                    {boxStats[0].isFull && (
                        <div class="bg-red-500 text-white p-3 rounded-lg mb-6 animate__animated animate__shakeX text-center font-bold">
                            ⚠️ 1번 상자가 가득 찼습니다! 먼저 학습해야 합니다.
                        </div>
                    )}

                    {/* Study Overlay */}
                    {currentStudyCard && (
                        <div class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center p-4 z-50">
                            <div class="w-full max-w-md">
                                <div class={`card-flip h-80 w-full relative cursor-pointer`} onClick={() => setIsFlipped(!isFlipped)}>
                                    <div class={`card-inner w-full h-full shadow-2xl rounded-3xl ${isFlipped ? 'card-flipped' : ''}`}>
                                        <div class="card-front bg-white flex items-center justify-center p-8 rounded-3xl border-4 border-indigo-500 text-center">
                                            <div>
                                                <span class="text-indigo-400 text-sm font-bold uppercase tracking-widest">Question</span>
                                                <h2 class="text-2xl font-bold mt-2">{currentStudyCard.front}</h2>
                                                <p class="text-gray-400 mt-10 text-sm italic">클릭하여 정답 확인</p>
                                            </div>
                                        </div>
                                        <div class="card-back bg-indigo-600 text-white flex items-center justify-center p-8 rounded-3xl text-center">
                                            <div>
                                                <span class="text-indigo-200 text-sm font-bold uppercase tracking-widest">Answer</span>
                                                <h2 class="text-xl mt-2">{currentStudyCard.back}</h2>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                {isFlipped && (
                                    <div class="flex gap-4 mt-8 animate__animated animate__fadeInUp">
                                        <button 
                                            onClick={() => handleResult(false)}
                                            class="flex-1 bg-red-500 text-white py-4 rounded-2xl font-bold hover:bg-red-600 shadow-lg"
                                        >
                                            몰라요 (1번으로)
                                        </button>
                                        <button 
                                            onClick={() => handleResult(true)}
                                            class="flex-1 bg-green-500 text-white py-4 rounded-2xl font-bold hover:bg-green-600 shadow-lg"
                                        >
                                            알아요 (다음 칸)
                                        </button>
                                    </div>
                                )}
                                <button 
                                    onClick={() => setCurrentStudyCard(null)}
                                    class="w-full mt-4 text-white opacity-60 hover:opacity-100"
                                >
                                    학습 중단하기
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
